name: CI SpringBoot Docker
on:
  push:
    branches: 
      - main

jobs:
  build-backend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: test15b
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Instalar Java 21
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '21'

      - name: Compilar proyecto
        run: mvn clean package -DskipTests
      
      - name: Verificar JAR generado
        run: ls -la target 

      - name: Login DockerHub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_TOKEN }}

      - name: Construir imagen Docker
        run: docker build -t ivandavidsierracudriz/backend-springboot-15a:latest .

      - name: Publicar iamgen en DockerHub
        run: docker push ivandavidsierracudriz/backend-springboot-15a:latest

  deploy-backend:
    needs: build-backend
    runs-on: self-hosted
    steps:
      - name: Actualizar contenedor backend
        run: |
          cd C:\Users\ivan\Documents\Uniempresarial\Despliegues Continuos\docker-ci-cd
          docker compose pull backend
          docker compose up -d backend
          


